name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "resources/deployment/onprem/webapp-python/**"
  pull_request:
    paths:
      - "resources/deployment/onprem/webapp-python/**"

defaults:
  run:
    working-directory: resources/deployment/onprem/webapp-python

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: resources/deployment/onprem/webapp-python/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: resources/deployment/onprem/webapp-python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: resources/deployment/onprem/webapp-python
          push: false
          tags: orders-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
