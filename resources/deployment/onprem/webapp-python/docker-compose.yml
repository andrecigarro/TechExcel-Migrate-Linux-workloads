services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST:-10.0.0.4}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-northwind}
      - DB_USER=${DB_USER:-demouser}
      - DB_PASSWORD=${DB_PASSWORD:-demopass123}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # Optional local PostgreSQL — remove this service when pointing at a real DB.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: northwind
      POSTGRES_USER: demouser
      POSTGRES_PASSWORD: demopass123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/northwind.sql:/docker-entrypoint-initdb.d/northwind.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demouser -d northwind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
