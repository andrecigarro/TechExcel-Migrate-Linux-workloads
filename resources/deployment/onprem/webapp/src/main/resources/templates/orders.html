<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        h2 {
            color: #555;
            text-align: center;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>Order Details</h1>
    <h2 th:text="'Connected to Database Server: ' + ${serverAddr}"></h2>
    <table>
        <tr>
            <th>Order ID</th>
            <th>Product ID</th>
            <th>Unit Price</th>
            <th>Quantity</th>
            <th>Discount</th>
        </tr>
        <tr th:each="order : ${orderDetails}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.productId}"></td>
            <td th:text="${order.unitPrice}"></td>
            <td th:text="${order.quantity}"></td>
            <td th:text="${order.discount}"></td>
        </tr>
    </table>
</body>
</html>
